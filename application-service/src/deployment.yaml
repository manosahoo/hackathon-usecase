apiVersion: apps/v1
kind: Deployment
metadata:
  name: application
spec:
  replicas: 2
  selector:
    matchLabels:
      app: application
  template:
    metadata:
      labels:
        app: application
    spec:
      containers:
      - name: application-service
        image: gcr.io/project-e102b4fc-db1c-4d68-9f1/node-app:IMAGE_TAG
        ports:
        - containerPort: 3000
